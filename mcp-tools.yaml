version: 2

# Priority scale:
#   10    = golden-path / core workflow
#   7-9   = common operations
#   4-6   = situational
#   1-3   = rare / cleanup

tools:
  # --- Bootstrap (no API key required) ---
  - type: operation
    operation_id: bootstrap_start
    name: bootstrap_start
    category: bootstrap
    priority: 9
    status: active
    requires_human: true
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
    when_to_use: >
      Kicking off a new seller account. The human will receive a 6-digit OTP
      by email; bring the code back and call bootstrap_verify.
    description: >
      Step 1 of 2. Emails an OTP and returns a single-use bootstrap_token
      plus the account_id. Token TTL 10 min.
      Flow: bootstrap_start → bootstrap_verify. No API key required.
    hints:
      - "Human interaction required: ask for their email, then tell them to check inbox"
      - "bootstrap_token expires in 10 minutes — call bootstrap_verify promptly"
      - "Disposable email domains are blocked"

  - type: operation
    operation_id: bootstrap_verify
    name: bootstrap_verify
    category: bootstrap
    priority: 9
    status: active
    requires_human: true
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: false
    when_to_use: >
      The human pasted the OTP. Call this once with bootstrap_token + otp_code
      to mint the API key.
    description: >
      Step 2 of 2. Verifies the OTP, issues the first API key (shown once —
      store immediately), and returns Stripe onboarding URL. Hand the Stripe
      URL to the human; poll bootstrap_poll until ready.
    hints:
      - "Store the api_key IMMEDIATELY — it is shown once and cannot be recovered"
      - "After receiving the key, restart this MCP session with the key to unlock all tools"
      - "After 5 failed OTP attempts the bootstrap_token is invalidated — call bootstrap_start again"
      - "Hand the stripe_onboarding_url to the human; poll bootstrap_poll every 30s until ready=true"

  - type: operation
    operation_id: bootstrap_poll
    name: bootstrap_poll
    category: bootstrap
    priority: 7
    status: active
    requires_human: false
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
    when_to_use: >
      Between API-key issuance and first sale — checking if the seller finished
      Stripe Connect onboarding.
    description: >
      Polling endpoint. Returns ready=true once charges_enabled; actions[]
      surfaces what's still blocking. Poll every 30 seconds after handing the
      Stripe onboarding URL to the human. Give up after 15 minutes.
    hints:
      - "Poll every 30s after sharing the Stripe onboarding URL"
      - "ready=true means the account can accept payments"
      - "actions[] lists what's still blocking with kind (api/human) and resolve details"
      - "Typical Stripe onboarding: 2-5 minutes. Give up after 15 minutes."

  # --- Listings ---
  - type: operation
    operation_id: create_listing
    name: create_listing
    category: listings
    priority: 10
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
    when_to_use: >
      Use when the user wants to start selling a product in one shot. The listing is
      created live (status: published) immediately — no draft step, no separate
      publish call. Works for digital goods (pass a deliverable), agent-fulfilled
      flows (leave deliverable null + provide agent_callback_url), or physical/service
      goods (external fulfillment, same null-deliverable shape).
    description: >
      Create a live, buyable listing in one call. Returns the checkout URL and a
      one-time signing_secret that you must store (subsequent reads don't expose it).
      The agent supplies deliverable for instant delivery (STATIC — ListBee sends
      the URL/text at order.paid), or leaves it null for agent-driven fulfillment
      (ASYNC — you call POST /v1/orders/{order_id}/fulfill after paid, or leave
      empty and fulfill externally). fulfillment_mode is computed automatically
      from deliverable presence; do not send it. Only name and price are required;
      provide rich description/tagline/highlights/faqs for better conversion.
    hints:
      - "signing_secret is returned ONCE at creation — store it immediately. It's the HMAC key for webhook verification."
      - "Stateless agents: pass your own signing_secret (≥16 chars) in the request so you never need to persist ListBee's generated value."
      - "metadata is your stateless context scratchpad. Up to 50 KB (50 keys × 10,000 chars per value). Flows back in the order.paid webhook; NOT forwarded to Stripe."
      - "url is a composite /l/{id}/{slug} — safe to share. The slug is derived from name; if name changes later, old slug URLs still work."
      - "image_url must be agent-hosted https://. ListBee does not fetch, cache, or validate images."
      - "Check readiness.buyable before sharing the URL with buyers. If false, readiness.actions[0] (or readiness.next) tells you how to resolve. kind: human means a human must act (Stripe Connect); kind: api means an agent can resolve it."
      - "checkout_schema max 5 fields (email is always auto-collected alongside). Keep it tight — every field costs conversion."
      - "Pass deliverable for STATIC delivery (ListBee sends at paid). Leave null for ASYNC (agent fulfills via POST /v1/orders/{order_id}/fulfill)."
    input_example:
      name: "50 Cold Outreach Templates"
      price: 1900
      currency: "usd"
      tagline: "Battle-tested templates that book meetings"
      description: "50 proven cold outreach templates used by 500+ SDRs. Each template includes subject line, body, and follow-up sequence. Average 45% open rate."
      image_url: "https://my-cdn.example.com/covers/cold-outreach.jpg"
      highlights:
        - "50 ready-to-send templates"
        - "45% average open rate"
        - "Follow-up sequences included"
      cta: "Get the Templates"
      metadata:
        source: "n8n"
        campaign: "launch-week"
        context: "SDR audience — cold outreach templates bundle v3"

  - type: operation
    operation_id: get_listing
    name: get_listing
    category: listings
    priority: 9
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use after any mutation (create, update) to inspect readiness and determine what to do next."
    description: >
      Get a listing's full state including readiness. This is the readiness
      inspection tool — call it after every change to check what's needed.
      readiness.buyable is true when the listing can accept purchases.
      If false, readiness.actions tells you what's missing and how to fix each item.
    hints:
      - "This is how you check readiness — call it after every create/update"
      - "readiness.buyable tells you if the listing is live"
      - "readiness.actions lists what's missing, with kind (api/human) and resolve details"
      - "readiness.next points to the highest-priority action"

  - type: operation
    operation_id: update_listing
    name: update_listing
    category: listings
    priority: 9
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use when changing title, price, or other listing details."
    hints:
      - "signing_secret can be rotated by passing a new value — omit to leave unchanged"
      - "metadata is a free-form dict (max 50 keys; key ≤ 40 chars, value ≤ 500 chars)"
      - "Pass null for a metadata key to remove it; omit metadata entirely to leave unchanged"
    input_example:
      name: "100 Cold Outreach Templates (Updated)"
      price: 2900

  - type: operation
    operation_id: list_listings
    name: list_listings
    category: listings
    priority: 7
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to see all listings for the current account."

  - type: operation
    operation_id: publish_listing
    name: publish_listing
    category: listings
    priority: 10
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
    when_to_use: "Use when the user wants the listing to go live."
    description: >
      Publish a listing so buyers can access the product page.
      No Stripe required — the product page goes live immediately.
      The buy button activates once Stripe is connected.
    hints:
      - "Product page goes live immediately — CTA disabled until Stripe connected"
      - "Check readiness.buyable after publish to see if payments work"

  - type: operation
    operation_id: delete_listing
    name: delete_listing
    category: listings
    priority: 2
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
    when_to_use: "Use when the user wants to permanently remove a listing."
    description: >
      Permanently delete a listing. This is irreversible — the listing, its
      checkout URL, and all associated data cannot be recovered.

  # --- Orders ---
  - type: operation
    operation_id: list_orders
    name: list_orders
    category: orders
    priority: 7
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use when the user wants to see their sales or check order status."

  - type: operation
    operation_id: get_order
    name: get_order
    category: orders
    priority: 6
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to get full details of a specific order including buyer info and payment."

  - type: operation
    operation_id: fulfill_order
    name: fulfill_order
    category: orders
    priority: 8
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
    when_to_use: "Use when you need to deliver digital content to a buyer after purchase, or close out an order as complete."
    description: >
      Mark a paid order as fulfilled by providing the deliverable content (single
      URL or Markdown text). The deliverable is delivered to the buyer via the
      unlock page and, if configured, the agent_callback_url webhook payload.
      Omit deliverable to mark the order as complete without delivering content
      (for externally fulfilled orders).
      metadata accepts a free-form dict (max 50 keys; key ≤ 40 chars, value ≤ 500 chars) —
      useful for correlating agent work (e.g. job_id, generation_run, delivery_ref).
    hints:
      - "Only works on orders in PAID state"
      - "Fires order.fulfilled event to agent_callback_url if configured"
      - "deliverable is optional — omit for close-out without content delivery"
      - "metadata persists on the order and is visible in get_order responses"
    input_example:
      order_id: "ord_9xM4kP7nR2qT5wY1"
      deliverable:
        type: "text"
        value: "Your personalized horoscope reading..."

  - type: operation
    operation_id: refund_order
    name: refund_order
    category: orders
    priority: 6
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
      idempotentHint: true
    when_to_use: "When a buyer requests a refund or the seller needs to reverse a charge. Only works on paid or fulfilled orders."
    description: >
      Issue a full refund for an order. This is irreversible and cannot be undone.
      Refund is processed through Stripe on the seller's connected account.
      Idempotent — already-refunded orders return as-is.
      Order state (refund_amount, refunded_at) updates asynchronously via Stripe webhook.
    hints:
      - "Only works on orders in PAID or FULFILLED status"
      - "Already-refunded orders return 200 with no action (idempotent)"
      - "Fires order.refunded event after Stripe processes the refund"
    input_example:
      order_id: "ord_9xM4kP7nR2qT5wY1"

  - type: operation
    operation_id: redeliver_order
    name: order_redeliver
    category: orders
    priority: 5
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: true
    when_to_use: >
      When an agent callback URL failed and the agent wants to trigger a retry
      out-of-band. Also useful after fixing a bug in the agent's callback handler
      to replay recent orders.
    description: >
      Requeue order.paid (and order.fulfilled if applicable) to the listing's
      agent_callback_url with attempt=1, no initial delay. Rate limited:
      10/hour/order, 100/hour/api-key. Pass an Idempotency-Key header to dedupe
      within 24h. Responds 202 with scheduled_attempts count. Zero means the
      listing has no agent_callback_url — agent should poll /v1/orders or
      /v1/events instead.
    hints:
      - "Only call after confirming the callback handler is healthy — otherwise retries will be consumed"
      - "If scheduled_attempts is 0, the listing has no agent_callback_url — poll /v1/orders or /v1/events instead"

  # --- Account ---
  - type: operation
    operation_id: get_account
    name: get_account
    category: account
    priority: 8
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to check account status, readiness, billing, Stripe connection, and profile details."
    description: >
      Returns account profile, stats, and operational readiness.
      readiness.operational is false until all required actions are resolved.
      Each action in readiness.actions has:
        code — what's needed (e.g. connect_stripe)
        kind — "api" (you can fix it) or "human" (user must act)
        resolve — exactly how to fix it (method + endpoint or URL)
        docs — documentation link for this action
      readiness.next is the highest-priority action code — resolve it first.
    hints:
      - "readiness.operational is true when the account can accept payments"
      - "readiness.actions lists what's needed — each has code, kind, message, and resolve"
      - "kind:api — resolve by calling resolve.endpoint with resolve.method"
      - "kind:human — share resolve.url with the user, then poll this endpoint every 30s until the action disappears"
      - "readiness.next is the highest-priority action code — resolve it first"
      - "Use this endpoint to poll for completion of human actions like Stripe onboarding"

  - type: operation
    operation_id: update_account
    name: update_account
    category: account
    priority: 5
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to update account-level settings (display name, bio, avatar, GA tracking, notification preferences)."
    description: >
      Update account settings including brand info (display_name, bio, avatar) and
      other account-level configuration.

  - type: operation
    operation_id: delete_account
    name: delete_account
    category: account
    priority: 1
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
    when_to_use: "Use only when the user explicitly wants to permanently delete their account."
    description: >
      Permanently delete the account and all associated data. This is irreversible.
    hints:
      - "This is destructive and irreversible — confirm with the user first"
      - "Before calling, use get_account to retrieve current account state, then surface a warning listing what will be permanently lost: all listings, orders, delivery history, and Stripe connection"
      - "Only call this after the user has acknowledged the irreversibility warning and given explicit confirmation to proceed"

  # --- Stripe ---
  - type: operation
    operation_id: start_stripe_connect
    name: start_stripe_connect
    category: stripe
    priority: 10
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
    requires_human: true
    when_to_use: "Use when readiness says Stripe is not connected. Returns a URL the human must visit."
    description: >
      Start Stripe Connect onboarding. Returns a URL for the human to complete
      in a browser. Required before selling through Stripe.
    hints:
      - "IMPORTANT: Only a human in a browser can complete Stripe onboarding"
      - "After sharing the URL, poll get_account every 30 seconds"
      - "Stripe is connected when readiness.actions no longer contains connect_stripe or enable_charges"
      - "If expires_at has passed, call start_stripe_connect again for a fresh URL"
      - "Typical completion: 2-5 minutes. Give up after 15 minutes."
      - "If the user closes before finishing, call start_stripe_connect again"

  - type: operation
    operation_id: disconnect_stripe
    name: disconnect_stripe
    category: stripe
    priority: 2
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
    when_to_use: "Use when the user wants to disconnect their Stripe account."
    description: >
      Disconnect the Stripe account from ListBee. This cannot be undone —
      you will need to re-onboard through Stripe Connect. Existing listings
      retain their payment snapshot but new checkouts will fail.
    hints:
      - "This doesn't delete the Stripe account — just disconnects it from ListBee"

  # --- API Keys ---
  - type: operation
    operation_id: api_key_self_revoke
    name: api_key_self_revoke
    category: api_keys
    priority: 3
    status: active
    requires_human: false
    annotations:
      readOnlyHint: false
      destructiveHint: true
      idempotentHint: true
      openWorldHint: false
    when_to_use: >
      Destroying the calling API key — use when the agent detects credential
      compromise or the human asks to invalidate the current key.
    description: >
      Self-revokes the API key in the Authorization header. Does not list or
      affect other keys on the account. Idempotent — already-revoked keys
      return 200. No rate limit.
    hints:
      - "This invalidates ONLY the key used to make this call — not other keys on the account"
      - "After calling this, the current MCP session loses authentication — inform the human"
      - "To issue a new key, the human must use the console (console.listbee.so)"

