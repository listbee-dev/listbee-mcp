version: 1

# Priority scale:
#   10    = golden-path / core workflow
#   7-9   = common operations
#   4-6   = situational
#   1-3   = rare / cleanup

tools:
  # --- Listings ---
  - type: operation
    operation_id: create_listing
    name: create_listing
    category: listings
    priority: 10
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
    when_to_use: "Use when the user wants to sell something new."
    description: >
      Create a new listing for sale. Returns a checkout URL and readiness status.
      Only name and price are required — but listings with rich content convert
      significantly better. Fill in as many fields as you can: description, tagline,
      highlights, badges, reviews, faqs, cta, cover_url. Write salesy, compelling
      copy. The product page buyers see is built entirely from these fields.
      Fulfillment is implicit: attach deliverables for auto-delivery, set fulfillment_url
      for agent callback, or handle via webhooks. No content_type field needed.
    hints:
      - "Always check readiness.sellable in the response"
      - "readiness.next tells you the highest-priority action to take"
      - "Only name + price are required, but fill in description, tagline, highlights, badges, reviews, faqs, cta for better conversions"
      - "Write compelling, benefit-focused copy — this IS the product page buyers see"
      - "checkout_schema and metadata are the only fields that don't appear on the product page"
    input_example:
      name: "50 Cold Outreach Templates"
      price: 1900
      tagline: "Battle-tested templates that book meetings"
      description: "50 proven cold outreach templates used by 500+ SDRs. Each template includes subject line, body, and follow-up sequence. Average 45% open rate."
      highlights:
        - "50 ready-to-send templates"
        - "45% average open rate"
        - "Follow-up sequences included"
      cta: "Get the Templates"

  - type: operation
    operation_id: get_listing
    name: get_listing
    category: listings
    priority: 9
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use after any mutation (create, update, set_deliverables) to inspect readiness and determine what to do next."
    description: >
      Get a listing's full state including readiness. This is the readiness
      inspection tool — call it after every change to check what's needed.
    hints:
      - "This is how you check readiness — call it after every create/update"
      - "readiness.sellable tells you if the listing is live"
      - "readiness.actions lists what's missing, with kind (api/human) and resolve details"
      - "readiness.next points to the highest-priority action"

  - type: operation
    operation_id: update_listing
    name: update_listing
    category: listings
    priority: 9
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use when changing title, price, or other listing details."
    description: >
      Update listing fields. Returns updated listing with readiness.
    input_example:
      name: "100 Cold Outreach Templates (Updated)"
      price: 2900

  - type: operation
    operation_id: list_listings
    name: list_listings
    category: listings
    priority: 7
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to see all listings for the current account."

  - type: operation
    operation_id: publish_listing
    name: publish_listing
    category: listings
    priority: 10
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
    when_to_use: "Use when the user wants the listing to go live."
    description: >
      Publish a listing so buyers can access the product page.
      No Stripe required — the product page goes live immediately.
      The buy button activates once Stripe is connected.
    hints:
      - "Product page goes live immediately — CTA disabled until Stripe connected"
      - "Check readiness.sellable after publish to see if payments work"

  - type: operation
    operation_id: set_deliverables
    name: set_deliverables
    category: listings
    priority: 9
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use after creating a listing to attach digital content for automatic delivery."
    description: >
      Set digital deliverables (files, URLs, or text) on a listing.
      Listings with deliverables auto-deliver to buyers on purchase.
    input_example:
      deliverables:
        - type: "url"
          value: "https://example.com/templates.zip"
          label: "Download link"

  - type: operation
    operation_id: remove_deliverables
    name: remove_deliverables
    category: listings
    priority: 3
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
    when_to_use: "Use when removing all deliverables from a listing (switches to agent-fulfilled or webhook delivery)."
    description: >
      Remove all deliverables from a listing. This is irreversible — the files
      and delivery configuration cannot be recovered. The listing switches to
      external fulfillment (webhook or agent callback).

  - type: operation
    operation_id: delete_listing
    name: delete_listing
    category: listings
    priority: 2
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
    when_to_use: "Use when the user wants to permanently remove a listing."
    description: >
      Permanently delete a listing. This is irreversible — the listing, its
      checkout URL, and all associated data cannot be recovered.

  # --- Files ---
  - type: operation
    operation_id: upload_file
    name: upload_file
    category: files
    priority: 8
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      openWorldHint: true
    when_to_use: "Use when the user has a file to sell. Upload first, then use the returned token in set_deliverables."
    description: >
      Upload a file and receive a token for use in deliverables.
    hints:
      - "Returns a file token — pass it to set_deliverables to attach the file to a listing"

  # --- Orders ---
  - type: operation
    operation_id: list_orders
    name: list_orders
    category: orders
    priority: 7
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use when the user wants to see their sales or check order status."

  - type: operation
    operation_id: get_order
    name: get_order
    category: orders
    priority: 6
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to get full details of a specific order including buyer info and payment."

  - type: operation
    operation_id: fulfill_order
    name: fulfill_order
    category: orders
    priority: 8
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
    when_to_use: "Use when you need to deliver digital content to a buyer after purchase, or close out an order as complete."
    description: >
      Fulfill an order. Include deliverables (file/url/text) to deliver digital content via ListBee —
      creates an access grant and emails the buyer. Omit deliverables to mark the order as complete
      without delivering content (for externally fulfilled orders).
    hints:
      - "Only works on orders in PAID state"
      - "Fires order.fulfilled webhook"
      - "Deliverables are optional — omit for close-out"
    input_example:
      order_id: "ord_9xM4kP7nR2qT5wY1"
      deliverables:
        - type: "text"
          value: "Your personalized horoscope reading..."

  - type: operation
    operation_id: refund_order
    name: refund_order
    category: orders
    priority: 6
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
      idempotentHint: true
    when_to_use: "When a buyer requests a refund or the seller needs to reverse a charge. Only works on paid or fulfilled orders."
    description: >
      Issue a full refund for an order. This is irreversible and cannot be undone.
      Refund is processed through Stripe on the seller's connected account.
      Idempotent — already-refunded orders return as-is.
      Order state (refund_amount, refunded_at) updates asynchronously via Stripe webhook.
    hints:
      - "Only works on orders in PAID or FULFILLED status"
      - "Already-refunded orders return 200 with no action (idempotent)"
      - "Fires order.refunded webhook after Stripe processes the refund"
    input_example:
      order_id: "ord_9xM4kP7nR2qT5wY1"

  # --- Customers ---
  - type: operation
    operation_id: list_customers
    name: list_customers
    category: customers
    priority: 7
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "When the agent needs buyer email addresses for marketing, wants to analyze purchasing patterns, or needs to identify repeat customers."
    description: >
      List all customers (buyers) who have purchased from the seller. Auto-populated
      from orders — no manual creation needed. Sorted by most recent purchase first.
      Filter by email for exact match lookup.
    hints:
      - "Customers are auto-created on first order — read-only, no create/delete"
      - "Use email filter to look up a specific buyer"
      - "total_spent is in cents (smallest currency unit)"

  - type: operation
    operation_id: get_customer
    name: get_customer
    category: customers
    priority: 6
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "When the agent needs purchase history details for a specific buyer."
    description: >
      Get a customer by ID. Shows total orders, total spent, currency, and purchase dates.
      Customers represent unique buyer emails that have purchased from the seller.
    hints:
      - "Use list_customers with email filter if you have the email but not the ID"

  # --- Account ---
  - type: operation
    operation_id: get_account
    name: get_account
    category: account
    priority: 8
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to check account status, readiness, billing, Stripe connection, and profile details."
    description: >
      Get the authenticated account's full state including readiness and billing status.
      This is the first call an agent should make to understand what's set up.
    hints:
      - "Call this first to understand account state"
      - "readiness.operational tells you if the account can sell"
      - "Check payment_config to see if Stripe is connected"

  - type: operation
    operation_id: update_account
    name: update_account
    category: account
    priority: 5
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to update account-level settings (GA tracking, notification preferences)."
    description: >
      Update account settings (GA tracking, notification preferences).

  - type: operation
    operation_id: delete_account
    name: delete_account
    category: account
    priority: 1
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
    when_to_use: "Use only when the user explicitly wants to permanently delete their account."
    description: >
      Permanently delete the account and all associated data. This is irreversible.
    hints:
      - "This is destructive and irreversible — confirm with the user first"

  # --- Stripe ---
  - type: operation
    operation_id: start_stripe_connect
    name: start_stripe_connect
    category: stripe
    priority: 10
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
    requires_human: true
    when_to_use: "Use when readiness says Stripe is not connected. Returns a URL the human must visit."
    description: >
      Start Stripe Connect onboarding. Returns a URL for the human to complete
      in a browser. Required before selling through Stripe.
    hints:
      - "You cannot complete this — the human must open the URL"
      - "After the human completes onboarding, check readiness again"

  - type: operation
    operation_id: disconnect_stripe
    name: disconnect_stripe
    category: stripe
    priority: 2
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
    when_to_use: "Use when the user wants to disconnect their Stripe account."
    description: >
      Disconnect the Stripe account from ListBee. This cannot be undone —
      you will need to re-onboard through Stripe Connect. Existing listings
      retain their payment snapshot but new checkouts will fail.
    hints:
      - "This doesn't delete the Stripe account — just disconnects it from ListBee"

  # --- Webhooks ---
  - type: operation
    operation_id: list_webhooks
    name: list_webhooks
    category: webhooks
    priority: 7
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to see configured webhooks and their delivery status."
    description: >
      List all webhooks for the account. Shows URL, events filter, and enabled status.

  - type: operation
    operation_id: create_webhook
    name: create_webhook
    category: webhooks
    priority: 8
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
    when_to_use: "Use when the user needs to receive order notifications at a URL."
    description: >
      Create a webhook endpoint. Specify the URL and which events to receive.
      The webhook secret (whsec_ prefixed) is returned for signature verification.
    hints:
      - "Recommended for listings without deliverables — ensures you get notified of orders"
      - "Common events: order.paid, order.fulfilled, order.refunded"
      - "The secret is only shown once at creation"
    input_example:
      url: "https://your-server.com/webhooks"
      events: ["order.paid", "order.fulfilled"]

  - type: operation
    operation_id: update_webhook
    name: update_webhook
    category: webhooks
    priority: 5
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to change a webhook's URL, events filter, or enabled status."

  - type: operation
    operation_id: delete_webhook
    name: delete_webhook
    category: webhooks
    priority: 3
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: true
    when_to_use: "Use to remove a webhook endpoint."
    description: >
      Permanently delete a webhook endpoint. This is irreversible — the webhook
      and its delivery history cannot be recovered.

  - type: operation
    operation_id: list_webhook_events
    name: list_webhook_events
    category: webhooks
    priority: 5
    status: active
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
    when_to_use: "Use to check webhook delivery history — see which events were sent and whether they succeeded."
    description: >
      List recent events for a webhook. Shows delivery status, attempts, and errors.
      Useful for debugging failed deliveries.

  - type: operation
    operation_id: retry_webhook_event
    name: retry_webhook_event
    category: webhooks
    priority: 4
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      openWorldHint: true
    when_to_use: "Use when a webhook delivery failed and needs to be retried."
    description: >
      Retry delivery of a failed webhook event. Resets attempt counter.

  - type: operation
    operation_id: test_webhook
    name: test_webhook
    category: webhooks
    priority: 5
    status: active
    annotations:
      readOnlyHint: false
      destructiveHint: false
      openWorldHint: true
    when_to_use: "Use to send a test event to a webhook URL to verify it's working."
    description: >
      Send a test event to the webhook URL. Returns the delivery result.
      Use this to verify webhook configuration before going live.

  # --- Future composite tools (v2+) ---
  # - type: composite
  #   name: create_and_publish
  #   category: workflows
  #   priority: 10
  #   steps: [create_listing, set_deliverables, publish_listing]
  #   when_to_use: "Use for one-shot listing creation when all details are ready."
