name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/publish.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy HTTP MCP to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      PROJECT: listbee-prod
      REGION: us-central1
      SERVICE: listbee-mcp
      REPO: listbee
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/862795876705/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: gh-deploy@listbee-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build + push image (Cloud Build)
        env:
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/${SERVICE}"
          gcloud builds submit \
            --project="${PROJECT}" \
            --tag="${IMAGE}:${TAG}" \
            --timeout=20m \
            .
          gcloud artifacts docker tags add \
            "${IMAGE}:${TAG}" \
            "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        env:
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/${SERVICE}:${TAG}"
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --port=8080 \
            --allow-unauthenticated \
            --update-labels="deployed-commit=${TAG}"
