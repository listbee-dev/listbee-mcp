name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [api-changed]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Fetch OpenAPI spec
        run: curl -sf https://api.listbee.so/openapi.json -o openapi.json
      - run: npm run lint
      - run: npm run build

  parity:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch OpenAPI spec
        run: curl -sf https://api.listbee.so/openapi.json -o openapi.json
      - run: npm run build
      - name: Verify all tools registered via stdio
        run: |
          # Get tools via stdio
          TOOLS_JSON=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.1.0"}}}
          {"jsonrpc":"2.0","id":2,"method":"tools/list"}' | LISTBEE_API_KEY=lb_ci_test node dist/index.js 2>/dev/null | tail -1)

          TOOL_COUNT=$(echo "$TOOLS_JSON" | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const r=JSON.parse(d);
            const count = (r.result?.tools||[]).length;
            console.log(count);
          ")

          # Count expected tools from generated meta
          EXPECTED=$(node -e "
            const m = require('./dist/generated/meta.js');
            console.log(Object.keys(m.meta || m.default?.meta || {}).length);
          ")

          echo "Registered tools: $TOOL_COUNT"
          echo "Expected from meta: $EXPECTED"

          if [ "$TOOL_COUNT" -eq "$EXPECTED" ] && [ "$TOOL_COUNT" -gt 0 ]; then
            echo "✓ Tool registration check passed ($TOOL_COUNT tools)"
          else
            echo "✗ Tool registration check FAILED"
            echo "  Expected: $EXPECTED, Got: $TOOL_COUNT"
            exit 1
          fi

  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch OpenAPI spec
        run: curl -sf https://api.listbee.so/openapi.json -o openapi.json
      - name: Fetch MCP manifest
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/listbee-dev/listbee/contents/app/mcp-tools.yaml" \
            | jq -r '.content' | tr -d '\n' | base64 -d > mcp-tools.yaml
      - name: Check for schema drift
        run: npm run generate -- --check
