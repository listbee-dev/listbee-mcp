name: Spec Sync

on:
  repository_dispatch:
    types: [api-spec-changed, api-deployed, sdk-published]

jobs:
  sync:
    if: github.event.action == 'api-spec-changed' || github.event.action == 'api-deployed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Decode spec from payload (api-spec-changed)
        if: github.event.action == 'api-spec-changed'
        run: |
          echo "${{ github.event.client_payload.spec }}" | base64 -d > openapi.json

      - name: Fetch fresh OpenAPI spec and manifest (api-deployed)
        if: github.event.action == 'api-deployed'
        run: |
          curl -sf https://api.listbee.so/openapi.json -o openapi.json
          curl -sf -H "Authorization: Bearer ${{ secrets.CROSS_REPO_TOKEN }}" \
            "https://api.github.com/repos/listbee-dev/listbee/contents/app/mcp-tools.yaml" \
            | jq -r '.content' | base64 -d > mcp-tools.yaml

      - name: Fetch manifest (api-spec-changed)
        if: github.event.action == 'api-spec-changed'
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.CROSS_REPO_TOKEN }}" \
            "https://api.github.com/repos/listbee-dev/listbee/contents/app/mcp-tools.yaml" \
            | jq -r '.content' | base64 -d > mcp-tools.yaml

      - name: Regenerate schemas
        run: npm run generate

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build change summary
        if: steps.diff.outputs.changed == 'true'
        id: summary
        run: |
          # Detect new/removed tools by comparing generated meta.ts
          OLD_TOOLS=$(git show HEAD:src/generated/meta.ts 2>/dev/null | grep -oP '^\s+\K\w+(?=: \{)' | sort || true)
          NEW_TOOLS=$(grep -oP '^\s+\K\w+(?=: \{)' src/generated/meta.ts | sort)

          ADDED=$(comm -13 <(echo "$OLD_TOOLS") <(echo "$NEW_TOOLS") || true)
          REMOVED=$(comm -23 <(echo "$OLD_TOOLS") <(echo "$NEW_TOOLS") || true)
          TOOL_COUNT=$(echo "$NEW_TOOLS" | wc -l | tr -d ' ')

          BODY="Automated spec sync after API deployment.\n\n"
          BODY+="**Tools:** ${TOOL_COUNT} total"

          if [ -n "$ADDED" ]; then
            BODY+="\n\n**New tools:**\n"
            while IFS= read -r t; do
              BODY+="- \`${t}\`\n"
            done <<< "$ADDED"
            BODY+="\n> New tools need handlers in \`src/tools/\` and registration in \`src/server.ts\` before merging."
          fi

          if [ -n "$REMOVED" ]; then
            BODY+="\n\n**Removed tools:**\n"
            while IFS= read -r t; do
              BODY+="- \`${t}\`\n"
            done <<< "$REMOVED"
          fi

          if [ -z "$ADDED" ] && [ -z "$REMOVED" ]; then
            BODY+="\n\nSchema-only changes (no new/removed tools). Safe to merge directly."
          fi

          printf "%s" "$BODY" > /tmp/pr-body.md

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/spec-sync"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if branch already exists on remote
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" >/dev/null 2>&1; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git add src/generated/
            git commit -m "chore: regenerate schemas from updated OpenAPI spec" || true
            git push origin "$BRANCH" --force-with-lease
          else
            git checkout -b "$BRANCH"
            git add src/generated/
            git commit -m "chore: regenerate schemas from updated OpenAPI spec"
            git push origin "$BRANCH"
          fi

          # Create PR if one doesn't exist yet, otherwise update body
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --body-file /tmp/pr-body.md
            echo "Updated existing PR #$EXISTING_PR"
          else
            gh pr create \
              --title "API spec updated — regenerated schemas" \
              --body-file /tmp/pr-body.md \
              --label "api-sync"
          fi

  bump-sdk:
    if: github.event.action == 'sdk-published'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Bump SDK version
        run: npm install listbee@latest
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: bump listbee SDK to ${{ github.event.client_payload.version }}"
          body: "Auto-generated after listbee SDK publish. Build: ${{ steps.build.outcome }}"
          branch: sdk-bump/auto
          labels: api-sync
          commit-message: "chore: bump listbee SDK dependency"
