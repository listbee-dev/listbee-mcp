name: Spec Sync

on:
  repository_dispatch:
    types: [api-deployed]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch fresh OpenAPI spec and manifest
        run: |
          curl -sf https://api.listbee.so/openapi.json -o openapi.json
          curl -sf -H "Authorization: Bearer ${{ secrets.CROSS_REPO_TOKEN }}" \
            "https://api.github.com/repos/listbee-dev/listbee/contents/app/mcp-tools.yaml" \
            | jq -r '.content' | base64 -d > mcp-tools.yaml

      - name: Regenerate schemas
        run: npm run generate

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/spec-sync-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add openapi.json mcp-tools.yaml src/generated/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync openapi.json + mcp-tools.yaml and regenerate schemas"
          git push origin "$BRANCH"
          gh pr create \
            --title "API spec updated — regenerated schemas" \
            --body "Auto-generated after API deployment. Review the diff, then merge and tag to publish." \
            --label "api-sync"
